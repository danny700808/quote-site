<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body{ font-family: Arial, "Noto Sans TC", "Microsoft JhengHei", sans-serif; color:#111; }
    .page{ padding:18mm 12mm; }
    .title{ font-size:18px; font-weight:900; margin-bottom:6px; }
    .meta{ font-size:12px; color:#444; line-height:1.6; }
    .box{ margin-top:10px; padding:10px 12px; border:1px solid #e5e7eb; border-radius:10px; background:#fafafa; }
    table{ width:100%; border-collapse:collapse; margin-top:10px; font-size:12px; }
    th,td{ padding:7px 8px; border:1px solid #eee; vertical-align:top; }
    th{ text-align:left; background:#f3f4f6; border-color:#e5e7eb; }
    .right{ text-align:right; }
    .sum{ margin-top:10px; font-size:12px; }
    .sumLine{ display:flex; justify-content:space-between; margin:4px 0; color:#444; }
    .sumTotal{ font-size:16px; font-weight:900; margin-top:8px; }
    .small{ font-size:11px; color:#666; margin-top:10px; line-height:1.6; }
    .pb{ page-break-after:always; }
    a{ color:#2f8f7b; text-decoration:underline; }
  </style>
</head>
<body>
  <? var g = data.globalForm || {}; ?>
  <? var sessions = data.sessions || []; ?>
  <? var s = data.summary || {}; ?>
  <? var loc = [g.city,g.area,g.addr,g.bldg].filter(function(x){return !!x;}).join(" "); ?>

  <!-- ===== Page 1: Summary ===== -->
  <div class="page">
    <div class="title">燈光音響｜報價單</div>
    <div class="meta">
      <div><b>訂單編號(Token)：</b><?= data.editToken || "" ?></div>
      <div><b>客戶：</b><?= g.name || "" ?><?= g.phone ? "｜"+g.phone : "" ?></div>
      <div><b>Email：</b><?= g.email || "" ?></div>
      <div><b>地點：</b><?= loc ?></div>
      <div><b>活動類型：</b><?= g.eventType || "" ?> ｜ <b>室內/戶外：</b><?= g.indoor || "" ?></div>
      <? if(g.note){ ?>
        <div><b>備註：</b><?= g.note ?></div>
      <? } ?>
      <? if(data.editUrl){ ?>
        <div><b>修改連結：</b><a href="<?= data.editUrl ?>"><?= data.editUrl ?></a></div>
      <? } ?>
    </div>

    <div class="box">
      <b>場次總覽</b>
      <table>
        <thead>
          <tr>
            <th>場次</th>
            <th style="width:95px">日期</th>
            <th style="width:120px">時間</th>
            <th class="right" style="width:95px">金額</th>
          </tr>
        </thead>
        <tbody>
          <? if(sessions && sessions.length){ ?>
            <? sessions.forEach(function(x){ ?>
              <tr>
                <td><?= x.label || "" ?></td>
                <td><?= x.date || "" ?></td>
                <td><?= (x.timeStart||"") + "～" + (x.timeEnd||"") ?></td>
                <td class="right">NT$<?= Number(x.total||0).toLocaleString("zh-Hant-TW") ?></td>
              </tr>
            <? }); ?>
          <? } else { ?>
            <tr><td colspan="4" class="small">（無場次）</td></tr>
          <? } ?>
        </tbody>
      </table>

      <div class="sum">
        <div class="sumLine"><span>合計</span><span><b>NT$<?= Number(s.grandTotal||0).toLocaleString("zh-Hant-TW") ?></b></span></div>
        <div class="sumLine sumTotal"><span>總金額</span><span>NT$<?= Number(s.grandTotal||0).toLocaleString("zh-Hant-TW") ?></span></div>
      </div>

      <div class="small">本報價單由系統產生。如需修改，請使用信件內的「修改訂單」連結或以上 Token 連結。</div>
    </div>
  </div>

  <div class="pb"></div>

  <!-- ===== Detail pages ===== -->
  <? if(sessions && sessions.length){ ?>
    <? sessions.forEach(function(x, idx){ ?>
      <div class="page">
        <div class="title">場次明細｜<?= x.label || ("場次 " + (idx+1)) ?></div>
        <div class="meta">
          <div><b>日期：</b><?= x.date || "" ?>　<b>時間：</b><?= (x.timeStart||"") + "～" + (x.timeEnd||"") ?></div>
          <div><b>場次金額：</b>NT$<?= Number(x.total||0).toLocaleString("zh-Hant-TW") ?></div>
        </div>

        <div class="box">
          <b>設備明細</b>
          <table>
            <thead>
              <tr>
                <th style="width:90px">分類</th>
                <th>項目</th>
                <th style="width:48px" class="right">數量</th>
                <th style="width:70px" class="right">單價</th>
                <th style="width:80px" class="right">小計</th>
                <th style="width:160px">選項</th>
              </tr>
            </thead>
            <tbody>
              <? var items = (x.items && x.items.length) ? x.items : []; ?>
              <? if(items.length){ ?>
                <? items.forEach(function(it){ ?>
                  <tr>
                    <td><?= it.category || "" ?></td>
                    <td><?= it.name || "" ?></td>
                    <td class="right"><?= Number(it.qty||0) ?></td>
                    <td class="right">NT$<?= Number(it.price||0).toLocaleString("zh-Hant-TW") ?></td>
                    <td class="right">NT$<?= Number(it.total||0).toLocaleString("zh-Hant-TW") ?></td>
                    <td><?= it.optionsText || "" ?></td>
                  </tr>
                <? }); ?>
              <? } else { ?>
                <tr><td colspan="6" class="small">（無明細）</td></tr>
              <? } ?>
            </tbody>
          </table>

          <div class="small">
            訂單編號(Token)：<b><?= data.editToken || "" ?></b>
            <? if(data.editUrl){ ?><br>修改連結：<?= data.editUrl ?><? } ?>
          </div>
        </div>
      </div>

      <? if(idx < sessions.length-1){ ?>
        <div class="pb"></div>
      <? } ?>
    <? }); ?>
  <? } ?>
</body>
</html>
